syntax = "proto3";

package telemetry;

option go_package = "github.com/Rajneesh100/kril/backend/pkg/telemetry/pb";

service TelemetryService {
  rpc PushMetric(PushMetricRequest) returns (PushMetricResponse);
}

message ExternalCall {
  string url = 1;
}

message LogEntry {
  string timestamp = 1;
  string level = 2;     // "info", "error", "warn", "debug"
  string message = 3;
}

message FunctionTrace {
  int32 index = 1;
  string current_function = 2;
  string parent_function = 3;
  string input = 4;              // JSON string
  string output = 5;             // JSON string
  double latency_ms = 6;
  bool have_error = 7;
  repeated LogEntry logs = 8;
  repeated ExternalCall external_calls = 9;
}

message PushMetricRequest {
  string service_name = 1;
  string process_type = 2;       // "api", "cron", "consumer"
  string endpoint = 3;
  string timestamp = 4;
  bool is_successful = 5;
  double latency_ms = 6;
  repeated FunctionTrace execution_flow = 7;
}

message PushMetricResponse {
  string request_id = 1;
  bool success = 2;
  string message = 3;
}
